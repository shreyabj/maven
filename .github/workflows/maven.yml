name: Java CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ] # Added main just in case
  workflow_dispatch: # This makes the "Run workflow" button appear manually

jobs:
  build:
    runs-on: windows-latest

    # env belongs to the job, so it must be indented under 'build'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build using Maven
        run: mvn clean install
        # Ensure this path matches your repository folder structure exactly
        working-directory: cicd_maven/demo
