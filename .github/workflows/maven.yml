name: Java CI/CD Pipeline

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    # env must be indented under the job name
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build using Maven
        # This step failed because of the directory path. 
        # Verify if it should be 'cicd-demo' or 'cicd_maven/demo'
        run: mvn clean install
        working-directory: cicd-demo
